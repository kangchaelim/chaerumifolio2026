      var params = new URLSearchParams(window.location.search);
      var id = params.get("id") || "";
      var project = data[id];

      var left = document.getElementById("workDetailLeft");
      var right = document.getElementById("workDetailRight");
      var notFound = document.getElementById("workDetailNotFound");

      if (project) {
        document.title = project.title + " · Chaerum Portfolio";
        document.getElementById("workDetailTitle").textContent = project.title;
        document.getElementById("workDetailDescShort").textContent = project.descShort || "";

        var liveWrap = document.querySelector(".work-detail__live-wrap");
        var liveBtn = document.getElementById("workDetailLive");
        if (project.category === "EXPERIMENTS") {
          liveWrap.style.display = "none";
        } else {
          liveWrap.style.display = "";
          if (project.liveUrl) {
            liveBtn.href = project.liveUrl;
            liveBtn.removeAttribute("aria-disabled");
          } else {
            liveBtn.href = "#";
            liveBtn.setAttribute("aria-disabled", "true");
          }
        }

        document.getElementById("workDetailApproach").innerHTML = "<p>" + (project.approach || "").replace(/\n/g, "</p><p>") + "</p>";
        document.getElementById("workDetailInfo").innerHTML = "<p>" + (project.info || "").replace(/\n/g, "</p><p>") + "</p>";

        var gallery = document.getElementById("workDetailGallery");
        var imgs = project.images || [project.image];
        if (!Array.isArray(imgs)) imgs = [imgs];
        imgs.forEach(function (src, i) {
          var wrap = document.createElement("div");
          wrap.className = "work-detail__gallery-item" + (i === 0 ? " work-detail__gallery-item--hero" : "");
          var img = document.createElement("img");
          img.src = src;
          img.alt = project.title + " " + (i + 1);
          img.loading = i === 0 ? "eager" : "lazy";
          img.width = i === 0 ? 1200 : 800;
          img.height = i === 0 ? 675 : 500;
          wrap.appendChild(img);
          gallery.appendChild(wrap);
        });

        left.style.display = "";
        right.style.display = "";
        notFound.hidden = true;

        /* GSAP 텍스트 리빌: 제목·한줄설명 (mystory와 동일한 y 110% → 0, stagger) */
        var titleEl = document.getElementById("workDetailTitle");
        var descShortEl = document.getElementById("workDetailDescShort");
        wrapReveal(titleEl);
        wrapReveal(descShortEl);
        if (typeof gsap !== "undefined") {
          var inners = left.querySelectorAll(".reveal__inner");
          if (inners.length) {
            gsap.set(inners, { y: "110%", opacity: 0 });
            gsap.to(inners, {
              y: 0,
              opacity: 1,
              duration: 0.85,
              stagger: 0.06,
              ease: "power3.out",
            });
          }
          /* 버튼 자체 리빌 (제목·한줄설명과 동일한 효과, stagger 이어서) */
          gsap.set(liveBtn, { y: "110%", opacity: 0 });
          gsap.to(liveBtn, {
            y: 0,
            opacity: 1,
            duration: 0.85,
            delay: 0.12,
            ease: "power3.out",
          });
        }

        /* 아코디언: GSAP으로 열기/닫기 (height + opacity) */
        document.querySelectorAll(".work-detail__accordion-trigger").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var expanded = this.getAttribute("aria-expanded") === "true";
            var panel = document.getElementById(this.getAttribute("aria-controls"));
            var body = panel ? panel.querySelector(".work-detail__accordion-body") : null;
            var icon = this.querySelector(".work-detail__accordion-icon");

            if (!panel || !body || typeof gsap === "undefined") {
              this.setAttribute("aria-expanded", !expanded);
              panel.classList.toggle("is-open", !expanded);
              icon.textContent = expanded ? "+" : "−";
              return;
            }

            if (expanded) {
              /* 닫기 */
              gsap.to(panel, { height: 0, duration: 0.32, ease: "power2.in" });
              gsap.to(body, { opacity: 0, duration: 0.2 });
              this.setAttribute("aria-expanded", "false");
              panel.classList.remove("is-open");
              icon.textContent = "+";
              gsap.delayedCall(0.32, function () {
                panel.style.height = "";
              });
            } else {
              /* 열기: 실제 높이 측정 후 애니메이션 */
              panel.style.height = "auto";
              var h = panel.offsetHeight;
              panel.style.height = "0";
              gsap.set(body, { opacity: 0 });
              this.setAttribute("aria-expanded", "true");
              panel.classList.add("is-open");
              icon.textContent = "−";
              gsap.to(panel, { height: h, duration: 0.35, ease: "power2.out" });
              gsap.to(body, { opacity: 1, duration: 0.28, delay: 0.06 });
            }
          });
        });
      } else {
        left.style.display = "none";
        right.style.display = "none";
        notFound.hidden = false;
      }
