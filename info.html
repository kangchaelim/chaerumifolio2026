<body class="body--sub body--info">

    <main class="info layout-padding" aria-label="연락처 및 소개">

        <div class="info__contact">

            <span class="info__contact-sep" aria-hidden="true">·</span>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    (function () {
      function wrapReveal(el) {
        if (!el || !el.firstChild) return;
        if (el.querySelector(".reveal")) return;
        var wrap = document.createElement("span");
        wrap.className = "reveal";
        var inner = document.createElement("span");
        inner.className = "reveal__inner";
        while (el.firstChild) inner.appendChild(el.firstChild);
        wrap.appendChild(inner);
        el.appendChild(wrap);
      }

      var inner = document.querySelector(".info__inner");
      if (!inner) return;

      var statement = inner.querySelector(".info__statement");
      if (statement) wrapReveal(statement);

      inner.querySelectorAll(".info__contact-line").forEach(function (line) {
        wrapReveal(line);
      });

      if (typeof gsap !== "undefined") {
        var inners = inner.querySelectorAll(".reveal__inner");
        if (inners.length) {
          gsap.set(inners, { y: "110%", opacity: 0 });
          gsap.to(inners, {
            y: 0,
            opacity: 1,
            duration: 0.85,
            stagger: 0.06,
            ease: "power3.out",
          });
        }
      }
    })();
  </script>
  <script src="./assets/js/main.js"></script>
</body>

</html>
